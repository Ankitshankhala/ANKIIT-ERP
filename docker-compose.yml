version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ankiit_erp_postgres
    environment:
      POSTGRES_DB: ankiit_erp
      POSTGRES_USER: ankiit_user
      POSTGRES_PASSWORD: ankiit_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - ankiit_network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: ankiit_erp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ankiit_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ankiit_erp_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ankiit_user:ankiit_password@postgres:5432/ankiit_erp
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-secret-key-here
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - ankiit_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ankiit_erp_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - ankiit_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  ankiit_network:
    driver: bridge
