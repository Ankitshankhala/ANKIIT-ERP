name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 backend/
    - name: Type check with mypy
      run: |
        pip install mypy sqlalchemy-stubs
        mypy backend/
    - name: Security audit with pip-audit
      run: |
        pip install pip-audit
        pip-audit -r backend/requirements.txt

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      working-directory: ./frontend
      # Use npm ci for reproducible builds from package-lock.json
      run: npm ci
    - name: Lint with ESLint
      working-directory: ./frontend
      # This step is expected to fail until the linting setup is fixed
      run: npm run lint --if-present
    - name: Type check with TypeScript
      working-directory: ./frontend
      # This step is expected to fail until the tsc script is fixed
      run: npm run type-check --if-present
    - name: Security audit with npm
      working-directory: ./frontend
      run: npm audit
